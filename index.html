<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin</title>
    <link rel="stylesheet" href="assets/css/login.css">
</head>
<body>

    <div class="login-box">
        <h2>Login Admin</h2>
        <input type="text" id="username" placeholder="Username" />
        <input type="password" id="password" placeholder="Password" />
        <button id="loginBtn">Login</button>
        <p class="error-msg" id="errorMessage"></p>
        <p class="footer-text">© 2026 <strong>ATP-IPB</strong></p>
    </div>

    <script>
        // ============================================
        // LOGIN SCRIPT - TANPA FIREBASE
        // ============================================

        const loginBtn = document.getElementById('loginBtn');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const errorMsg = document.getElementById('errorMessage');

        // CREDENTIALS (STATIC)
        const VALID_USERNAME = "agribusinesstechnologypark";
        const VALID_PASSWORD = "atpipb2026";

        loginBtn.addEventListener('click', function() {
            const username = usernameInput.value.trim();
            const password = passwordInput.value;

            errorMsg.style.display = 'none';
            loginBtn.textContent = 'Loading...';
            loginBtn.disabled = true;

            // Validasi username
            if (username !== VALID_USERNAME) {
                errorMsg.textContent = '❌ Username salah!';
                errorMsg.style.display = 'block';
                loginBtn.textContent = 'Login';
                loginBtn.disabled = false;
                return;
            }

            // Validasi password
            if (password !== VALID_PASSWORD) {
                errorMsg.textContent = '❌ Password salah!';
                errorMsg.style.display = 'block';
                loginBtn.textContent = 'Login';
                loginBtn.disabled = false;
                return;
            }

            // Login berhasil
            console.log('✅ Login berhasil!');
            alert('✅ Login berhasil!');
            window.location.href = "admin/dashboard.html";
        });

        // Enter key support
        passwordInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') loginBtn.click();
        });
        usernameInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') loginBtn.click();
        });

        console.log('✅ Login page ready!');
        console.log('📌 Username: agribusinesstechnologypark | Password: atpipb2026');
    </script>

</body>
</html>
